name: Build OpenWrt (Ultimate Stable)

on:
  workflow_dispatch:
    inputs:
      router_ip:
        description: '請設置路由器的管理地址'
        required: true
        default: '192.168.10.1'
        type: string
      firmware_size:
        description: '請輸入韌體大小 (MB)'
        required: true
        default: '2048'
        type: string
      include_openclash:
        description: '是否安裝 OpenClash？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      include_docker:
        description: '是否安裝 Docker？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      include_ext_apps:
        description: '是否安裝常用外掛？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  contents: write

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize Environment
      run: |
        sudo apt-get update
        # 加入 zstd 以防最新版 OpenWrt 使用 zst 壓縮
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
        zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 qemu-utils zstd
        sudo apt-get clean

    - name: Download Image Builder
      run: |
        echo "正在偵測官方伺服器上的最新穩定版..."
        BASE_URL="https://downloads.openwrt.org/releases"
        VERSION=$(curl -s "$BASE_URL/" | grep -oE '>[0-9]+\.[0-9]+\.[0-9]+' | cut -d '>' -f 2 | sort -V | tail -n 1)
        
        echo "偵測到最新可用版本: $VERSION"
        TARGET_URL="$BASE_URL/$VERSION/targets/x86/64"
        
        wget -O sha256sums "$TARGET_URL/sha256sums"
        IB_FILENAME=$(grep "openwrt-imagebuilder" sha256sums | grep "x86-64" | head -n 1 | awk '{print $2}' | tr -d '*')
        
        if [ -z "$IB_FILENAME" ]; then
          echo "錯誤：無法找到 Image Builder 檔案！"
          exit 1
        fi
        
        echo "正在下載: $IB_FILENAME"
        wget -O imagebuilder.tar.xz "$TARGET_URL/$IB_FILENAME"
        mkdir -p openwrt
        tar -xf imagebuilder.tar.xz --strip-components=1 -C openwrt
        
        echo "OPENWRT_VERSION=$VERSION" >> $GITHUB_ENV
        echo "BUILD_DATE=$(date +"%Y%m%d")" >> $GITHUB_ENV

    - name: Configure Firmware
      working-directory: ./openwrt
      run: |
        sed -i '/CONFIG_TARGET_ROOTFS_PARTSIZE/d' .config
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ github.event.inputs.firmware_size }}" >> .config
        
        mkdir -p files/etc/uci-defaults
        mkdir -p files/root
        
        CUSTOM_SCRIPT="files/etc/uci-defaults/99-custom-settings"
        echo "#!/bin/sh" > "$CUSTOM_SCRIPT"
        echo "uci set network.lan.ipaddr='${{ github.event.inputs.router_ip }}'" >> "$CUSTOM_SCRIPT"
        echo "uci set luci.main.lang='zh_tw'" >> "$CUSTOM_SCRIPT"
        echo "uci commit" >> "$CUSTOM_SCRIPT"
        echo "exit 0" >> "$CUSTOM_SCRIPT"
        chmod +x "$CUSTOM_SCRIPT"

    - name: Prepare OpenClash (Offline Install)
      working-directory: ./openwrt
      run: |
        if [ "${{ github.event.inputs.include_openclash }}" = "yes" ]; then
          echo "正在下載 OpenClash APK..."
          CLASH_URL=$(curl -sL https://api.github.com/repos/vernesong/OpenClash/releases/latest | grep -oE 'https://[^"]*luci-app-openclash[^"]*\.apk' | head -n 1)
          
          if [ -z "$CLASH_URL" ]; then
            CLASH_URL="https://github.com/vernesong/OpenClash/releases/download/v0.47.055/luci-app-openclash-0.47.055.apk"
          fi
          
          echo "下載目標: $CLASH_URL"
          wget -O files/root/luci-app-openclash.apk "$CLASH_URL"
          
          INSTALL_SCRIPT="files/etc/uci-defaults/99-install-openclash"
          echo "#!/bin/sh" > "$INSTALL_SCRIPT"
          echo "sleep 10" >> "$INSTALL_SCRIPT"
          echo "echo '正在安裝 OpenClash...'" >> "$INSTALL_SCRIPT"
          echo "apk add --allow-untrusted --force-overwrite /root/luci-app-openclash.apk" >> "$INSTALL_SCRIPT"
          echo "rm -f /root/luci-app-openclash.apk" >> "$INSTALL_SCRIPT"
          echo "exit 0" >> "$INSTALL_SCRIPT"
          chmod +x "$INSTALL_SCRIPT"
        fi

    - name: Build Firmware
      working-directory: ./openwrt
      run: |
        PACKAGES="base-files libc ca-bundle curl wget bash unzip gzip \
        luci luci-ssl luci-base luci-compat \
        luci-i18n-base-zh-tw \
        luci-app-attendedsysupgrade \
        parted losetup resize2fs lsblk"
        
        if [ "${{ github.event.inputs.include_openclash }}" = "yes" ]; then
            PACKAGES="$PACKAGES -dnsmasq dnsmasq-full \
            ruby ruby-yaml kmod-tun kmod-inet-diag kmod-nft-tproxy libcap libcap-bin"
        fi
        
        if [ "${{ github.event.inputs.include_docker }}" = "yes" ]; then
            PACKAGES="$PACKAGES docker dockerd luci-app-dockerman"
        fi
        
        if [ "${{ github.event.inputs.include_ext_apps }}" = "yes" ]; then
            PACKAGES="$PACKAGES luci-app-upnp luci-app-samba4 luci-app-ttyd luci-app-wol luci-app-ddns"
        fi
        
        echo "開始打包..."
        make image PROFILE=generic PACKAGES="$PACKAGES" FILES="files" EXTRA_kmod_fs_ext4=y

    - name: Process Files & Generate VMDK
      run: |
        echo "正在處理檔案..."
        OUTPUT_DIR="${{ github.workspace }}/release_files"
        mkdir -p "$OUTPUT_DIR"
        
        cd openwrt/bin/targets/x86/64/ || exit 1
        echo "=== 列出編譯出來的檔案 ==="
        ls -la
        
        # [關鍵修正] 放寬搜尋條件，確保能抓到所有的映像檔
        cp *.img* "$OUTPUT_DIR/" 2>/dev/null || true
        cp *buildinfo "$OUTPUT_DIR/" 2>/dev/null || true
        cp *manifest "$OUTPUT_DIR/" 2>/dev/null || true
        cp sha256sums "$OUTPUT_DIR/" 2>/dev/null || true
        
        cd "$OUTPUT_DIR"
        
        echo "解壓縮映像檔以準備轉換..."
        for f in *.img.gz; do
          if [ -f "$f" ]; then
            echo "解壓縮: $f"
            gunzip -k "$f"
          fi
        done
        for f in *.img.zst; do
          if [ -f "$f" ]; then
            echo "解壓縮: $f"
            zstd -d "$f"
          fi
        done
        
        echo "正在生成 VMDK..."
        for img in *.img; do
          if [ -f "$img" ]; then
            vmdk_file="${img%.img}.vmdk"
            echo "轉換: $img -> $vmdk_file"
            qemu-img convert -f raw -O vmdk "$img" "$vmdk_file"
            
            echo "壓縮 VMDK..."
            gzip "$vmdk_file"
            
            # 轉換完成後刪除 raw img (因為已有 .img.gz 保留)
            rm -f "$img"
          fi
        done
        
        echo "=== 準備發布的最終檔案 ==="
        ls -la

    - name: Generate Release Info
      run: |
        DATE_STR=$(date +"%Y%m%d-%H%M")
        # [關鍵修正] 使用 OPENWRT_VERSION，避免 Tag 錯誤導致上傳死當
        RELEASE_NAME="OpenWrt_v${{ env.OPENWRT_VERSION }}_${DATE_STR}"
        RELEASE_TAG="v${{ env.OPENWRT_VERSION }}_${DATE_STR}"
        echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
        echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV

    - name: Upload to Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: ${{ env.RELEASE_NAME }}
        files: release_files/*
        body: |
          ### OpenWrt x86_64 穩定版 (Image Builder)
          
          * **核心版本**: v${{ env.OPENWRT_VERSION }}
          * **打包日期**: ${{ env.BUILD_DATE }}
          
          #### 🔐 資訊：
          * **IP**: `${{ github.event.inputs.router_ip }}`
          * **帳號**: `root` / **密碼**: `無`
          
          #### 🚀 功能：
          * **OpenClash**: `${{ github.event.inputs.include_openclash == 'yes' && '✅ 已包含 (開機自動安裝)' || '❌ 未包含' }}`
          * **Docker**: `${{ github.event.inputs.include_docker == 'yes' && '✅ 已包含' || '❌ 未包含' }}`
          * **常用外掛**: `${{ github.event.inputs.include_ext_apps == 'yes' && '✅ 已包含' || '❌ 未包含' }}`
          
          #### 💾 空間保證：
          * **系統分區**: `${{ github.event.inputs.firmware_size }} MB`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
