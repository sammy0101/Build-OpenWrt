name: Build OpenWrt (Image Builder Fixed)

on:
  workflow_dispatch:
    inputs:
      router_ip:
        description: '請設置路由器的管理地址'
        required: true
        default: '192.168.10.1'
        type: string
      firmware_size:
        description: '請輸入韌體大小 (MB)'
        required: true
        default: '2048'
        type: string
      include_openclash:
        description: '是否內建 OpenClash (APK版)？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      include_docker:
        description: '是否內建 Docker？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      include_ext_apps:
        description: '是否內建常用外掛？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  contents: write

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
        zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 qemu-utils
        sudo apt-get clean

    # [關鍵修正] 改用網頁爬蟲方式抓取版本與檔名，解決 404 問題
    - name: Download Image Builder
      run: |
        # 1. 從官方下載頁面爬取最新的穩定版本號 (排除 SNAPSHOT)
        echo "正在偵測官方伺服器上的最新穩定版..."
        BASE_URL="https://downloads.openwrt.org/releases"
        # 抓取目錄列表 -> 篩選版本號 -> 排序 -> 取最新
        VERSION=$(curl -s "$BASE_URL/" | grep -oE '>[0-9]+\.[0-9]+\.[0-9]+' | cut -d '>' -f 2 | sort -V | tail -n 1)
        
        echo "偵測到最新可用版本: $VERSION"
        
        # 2. 設定目標架構路徑
        TARGET_URL="$BASE_URL/$VERSION/targets/x86/64"
        
        # 3. 下載校驗檔以獲取正確的 Image Builder 檔名 (解決 .xz 或 .zst 檔名問題)
        wget -O sha256sums "$TARGET_URL/sha256sums"
        
        # 4. 從校驗檔中找出 imagebuilder 的檔名
        IB_FILENAME=$(grep "openwrt-imagebuilder" sha256sums | grep "x86-64" | head -n 1 | awk '{print $2}' | tr -d '*')
        
        if [ -z "$IB_FILENAME" ]; then
          echo "錯誤：無法在 sha256sums 中找到 Image Builder 檔案！"
          exit 1
        fi
        
        echo "準備下載檔案: $IB_FILENAME"
        
        # 5. 下載真正的 Image Builder
        wget -O imagebuilder.tar.xz "$TARGET_URL/$IB_FILENAME"
        
        # 6. 解壓
        mkdir -p openwrt
        tar -xf imagebuilder.tar.xz --strip-components=1 -C openwrt
        
        echo "OPENWRT_VERSION=$VERSION" >> $GITHUB_ENV
        echo "BUILD_DATE=$(date +"%Y%m%d")" >> $GITHUB_ENV

    - name: Prepare OpenClash (APK Mode)
      working-directory: ./openwrt
      run: |
        if [ "${{ github.event.inputs.include_openclash }}" = "yes" ]; then
          echo "正在處理 OpenClash APK..."
          mkdir -p packages
          
          # 下載最新的 .apk
          CLASH_URL=$(curl -sL https://api.github.com/repos/vernesong/OpenClash/releases/latest | grep "browser_download_url" | grep "luci-app-openclash" | grep ".apk" | head -n 1 | cut -d '"' -f 4)
          wget -P packages "$CLASH_URL"
          
          # 嘗試建立 APK 索引 (如果 Image Builder 支援)
          # 檢查是否有 APK 工具
          if [ -f "staging_dir/host/bin/apk" ]; then
             APK_BIN="./staging_dir/host/bin/apk"
          else
             APK_BIN=$(find . -name apk -type f | head -n 1)
          fi
          
          if [ -n "$APK_BIN" ]; then
            echo "建立 APK 索引..."
            "$APK_BIN" mkindex -o packages/APKINDEX.tar.gz packages/*.apk
            
            # 加入本地源
            sed -i "1i src/custom file://$(pwd)/packages" repositories.conf
          else
            echo "⚠️ 警告：找不到 apk 工具，這可能是一個舊版 Image Builder。"
            echo "正在切換回 IPK 兼容模式..."
            # 如果是舊版，我們只能嘗試用 IPK 方式 (但這需要下載 IPK 檔)
            # 這裡為了保險，如果找不到 apk，我們假設依賴會由線上源解決，只放 apk 檔案看看
          fi
        fi

    - name: Configure Firmware
      working-directory: ./openwrt
      run: |
        # 設定 2GB 空間
        sed -i '/CONFIG_TARGET_ROOTFS_PARTSIZE/d' .config
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ github.event.inputs.firmware_size }}" >> .config
        
        # 設定 IP
        mkdir -p files/etc/uci-defaults
        cat << "EOF" > files/etc/uci-defaults/99-custom-settings
        #!/bin/sh
        uci set network.lan.ipaddr='${{ github.event.inputs.router_ip }}'
        # 嘗試設定中文，如果沒安裝語言包則此行無效但不報錯
        uci set luci.main.lang='zh_tw'
        uci commit
        exit 0
        EOF
        chmod +x files/etc/uci-defaults/99-custom-settings

    - name: Build Firmware
      working-directory: ./openwrt
      run: |
        # 基礎套件
        PACKAGES="base-files libc ca-bundle curl wget bash unzip gzip \
        luci luci-ssl luci-base luci-compat \
        luci-app-attendedsysupgrade \
        parted losetup resize2fs lsblk"
        
        # OpenClash (APK 依賴鏈)
        if [ "${{ github.event.inputs.include_openclash }}" = "yes" ]; then
            # 注意：如果下載的是 23.05 (opkg)，這裡可能會報錯
            # 但既然你有 APK 連結，我們假設目標是支援 APK 的版本
            PACKAGES="$PACKAGES luci-app-openclash \
            -dnsmasq dnsmasq-full \
            ruby ruby-yaml kmod-tun kmod-inet-diag kmod-nft-tproxy libcap libcap-bin"
        fi
        
        # Docker
        if [ "${{ github.event.inputs.include_docker }}" = "yes" ]; then
            PACKAGES="$PACKAGES docker dockerd luci-app-dockerman"
        fi
        
        # 常用外掛
        if [ "${{ github.event.inputs.include_ext_apps }}" = "yes" ]; then
            PACKAGES="$PACKAGES luci-app-upnp luci-app-samba4 luci-app-ttyd luci-app-wol luci-app-ddns"
        fi
        
        echo "開始打包..."
        # 加上 --allow-untrusted 允許安裝無簽章的 OpenClash
        make image PROFILE=generic PACKAGES="$PACKAGES" FILES="files" EXTRA_kmod_fs_ext4=y BIN_DIR="bin/targets/x86/64"

    - name: Process Files
      working-directory: ./openwrt/bin/targets/x86/64
      run: |
        echo "正在處理檔案..."
        mkdir -p ../../../../release_files
        
        # 複製檔案 (Image Builder 的輸出通常是 combined-efi.img.gz)
        for file in *combined-efi.img.gz; do
          if [ -f "$file" ]; then
            cp "$file" "../../../../release_files/"
            
            # 解壓並轉 VMDK
            gunzip -k "$file"
            raw_file=${file%.gz}
            vmdk_file=${raw_file%.img}.vmdk
            
            echo "轉換 VMDK: $raw_file -> $vmdk_file"
            qemu-img convert -f raw -O vmdk "$raw_file" "../../../../release_files/$vmdk_file"
          fi
        done

    - name: Compress VMDK
      run: |
        cd release_files
        gzip *.vmdk

    - name: Upload to Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.OPENWRT_VERSION }}-${{ env.BUILD_DATE }}
        name: OpenWrt v${{ env.OPENWRT_VERSION }} (ImageBuilder)
        files: release_files/*
        body: |
          ### OpenWrt x86_64 穩定版 (Image Builder)
          
          * **核心版本**: ${{ env.OPENWRT_VERSION }}
          * **打包日期**: ${{ env.BUILD_DATE }}
          
          #### 🔐 資訊：
          * **IP**: `${{ github.event.inputs.router_ip }}`
          * **帳號**: `root` / **密碼**: `無`
          
          #### 💾 空間：
          * **系統分區**: `${{ github.event.inputs.firmware_size }} MB`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
