name: Build OpenWrt & Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      lan_ip:
        description: 'OpenWrt 本機管理 IP (LAN IP)'
        default: '192.168.10.2' # 旁路由通常不佔用 .1
        required: true
      rootfs_size:
        description: '韌體大小 (MB)'
        default: '2048'
        required: true
      is_side_router:
        description: '是否設為旁路由模式? (關閉 DHCP, 設定 Gateway)'
        type: choice
        options:
          - 'no'
          - 'yes'
        default: 'no'
      gateway_ip:
        description: '主路由 IP (Gateway) (若選 yes 則必填)'
        default: '192.168.10.1'
        required: false

env:
  REPO_URL: https://github.com/openwrt/openwrt
  TZ: Asia/Taipei

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: 初始化編譯環境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        docker rmi `docker images -q` || true
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils python3-setuptools python3-pyelftools \
        rsync unzip zlib1g-dev file wget qemu-utils
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 下載源碼並切換至最新穩定版
      run: |
        git clone $REPO_URL openwrt
        cd openwrt
        LATEST_TAG=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -n 1)
        echo "檢測到的最新穩定版本為: $LATEST_TAG"
        git checkout $LATEST_TAG
        echo "OPENWRT_VERSION=$LATEST_TAG" >> $GITHUB_ENV
        echo "DATE=$(date +%Y.%m.%d-%H%M)" >> $GITHUB_ENV

    - name: 更新並安裝 Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 自定義配置 (IP, 旁路由, LuCI, 格式)
      run: |
        cd openwrt
        
        # --- 1. 修改 LAN IP (基礎) ---
        sed -i "s/192.168.1.1/${{ inputs.lan_ip }}/g" package/base-files/files/bin/config_generate
        
        # --- 2. 建立 "初次開機設定腳本" (UCI Defaults) ---
        # 這是實現「旁路由自動設定」與「線上更新支援」的關鍵
        mkdir -p files/etc/uci-defaults
        cat << 'EOF' > files/etc/uci-defaults/99-custom-setup
        #!/bin/sh
        
        # 讀取環境變數 (在編譯時寫入)
        IS_SIDE_ROUTER='${{ inputs.is_side_router }}'
        GATEWAY_IP='${{ inputs.gateway_ip }}'
        
        uci set system.@system[0].hostname='OpenWrt-Side'
        uci set system.@system[0].timezone='CST-8'
        uci set system.@system[0].zonename='Asia/Taipei'

        # === 旁路由邏輯 ===
        if [ "$IS_SIDE_ROUTER" = "yes" ]; then
            # 1. 設定 Gateway 和 DNS 指向主路由
            uci set network.lan.gateway="$GATEWAY_IP"
            uci set network.lan.dns="$GATEWAY_IP"
            
            # 2. 關閉 DHCP Server (旁路由不發 IP)
            uci set dhcp.lan.ignore='1'
            
            # 3. 防火牆設定 (允許 LAN 轉發，解決部分旁路由無法上網問題)
            # 在防火牆 defaults 區塊啟用轉發
            uci set firewall.@defaults[0].forward='ACCEPT'
            # 確保 LAN 口有偽裝 (Masquerading)，這對單臂路由很重要
            uci set firewall.@zone[0].masq='1'
        fi
        
        uci commit
        exit 0
        EOF
        
        # 給予腳本執行權限
        chmod +x files/etc/uci-defaults/99-custom-setup
        
        # --- 3. 生成基礎配置 (x86/64) ---
        echo "CONFIG_TARGET_x86=y" > .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_Generic=y" >> .config
        
        # --- 4. 設定韌體分區大小 ---
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ inputs.rootfs_size }}" >> .config
        echo "CONFIG_TARGET_KERNEL_PARTSIZE=256" >> .config
        
        # --- 5. 設定輸出格式 ---
        echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
        echo "CONFIG_VMDK_IMAGES=y" >> .config
        echo "# CONFIG_ISO_IMAGES is not set" >> .config
        echo "# CONFIG_VDI_IMAGES is not set" >> .config
        
        # --- 6. 啟用 LuCI (英文原版) ---
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
        
        # --- 7. 線上更新與基礎工具 ---
        # luci-app-attendant: 簡單的韌體更新介面
        echo "CONFIG_PACKAGE_luci-app-attendant=y" >> .config
        # ca-bundle & libustream: 確保 opkg 可以 HTTPS 下載
        echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
        echo "CONFIG_PACKAGE_libustream-openssl=y" >> .config
        echo "CONFIG_PACKAGE_curl=y" >> .config
        echo "CONFIG_PACKAGE_wget-ssl=y" >> .config
        echo "CONFIG_PACKAGE_nano=y" >> .config

        make defconfig

    - name: 下載軟體包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 編譯固件
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s

    - name: 整理文件與手動壓縮
      id: organize
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        rm -f *.buildinfo *.json *.manifest *-kernel.bin *-rootfs.img
        
        # 壓縮 VMDK
        echo "正在壓縮 VMDK..."
        gzip -9 *.vmdk
        
        ls -lh
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 發布 Release
      uses: softprops/action-gh-release@v1
      if: steps.organize.outputs.status == 'success'
      with:
        tag_name: ${{ env.OPENWRT_VERSION }}-${{ env.DATE }}
        name: OpenWrt ${{ env.OPENWRT_VERSION }} (${{ env.DATE }})
        files: ${{ env.FIRMWARE }}/*
        body: |
          ### ✅ 編譯資訊 / Build Info
          
          *   **版本:** `${{ env.OPENWRT_VERSION }}`
          *   **模式:** `${{ inputs.is_side_router == 'yes' && '旁路由 (Side Router)' || '主路由 (Gateway)' }}`
          *   **IP 地址:** `${{ inputs.lan_ip }}`
          *   **Gateway:** `${{ inputs.gateway_ip }}` (僅旁路由模式生效)
          *   **帳號/密碼:** `root` / `無`
          
          ### 🛠 特色功能
          
          1.  **自動旁路由設定**: 若選擇 Yes，開機即自動關閉 DHCP 並設定 Gateway。
          2.  **線上更新支援**: 預裝 `luci-app-attendant` 及 SSL 證書，支援 opkg 更新。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
