name: Build Pure OpenWrt Stable (English)

on:
  workflow_dispatch:
    inputs:
      lan_ip:
        description: '請設置路由器的管理地址 (LAN IP)'
        default: '192.168.10.1'
        required: true
      rootfs_size:
        description: '請輸入韌體大小 (MB) (例如 1024 或 2048)'
        default: '2048'
        required: true

env:
  REPO_URL: https://github.com/openwrt/openwrt
  TZ: Asia/Taipei

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: 初始化編譯環境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 下載源碼並切換至最新穩定版
      run: |
        git clone $REPO_URL openwrt
        cd openwrt
        # 自動搜尋最新的穩定版 Tag (格式如 v23.05.5)，排除 -rc 版本
        LATEST_TAG=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -n 1)
        echo "檢測到的最新穩定版本為: $LATEST_TAG"
        git checkout $LATEST_TAG
        echo "OPENWRT_VERSION=$LATEST_TAG" >> $GITHUB_ENV

    - name: 更新並安裝 Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 自定義配置 (IP, 空間, LuCI, 格式)
      run: |
        cd openwrt
        
        # --- 1. 修改 LAN IP ---
        sed -i "s/192.168.1.1/${{ github.event.inputs.lan_ip }}/g" package/base-files/files/bin/config_generate
        
        # --- 2. 生成基礎配置 (x86/64) ---
        echo "CONFIG_TARGET_x86=y" > .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_Generic=y" >> .config
        
        # --- 3. 設定韌體分區大小 ---
        # 這是你輸入的空間大小 (MB)
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ github.event.inputs.rootfs_size }}" >> .config
        # Kernel 分區固定 128MB 即可
        echo "CONFIG_TARGET_KERNEL_PARTSIZE=128" >> .config
        
        # --- 4. 設定輸出格式 (.gz 和 .vmdk) ---
        # 產生 .img.gz (極高壓縮率，解決檔案過大問題)
        echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
        # 產生 .vmdk (虛擬機專用)
        echo "CONFIG_VMDK_IMAGES=y" >> .config
        # 關閉不需要的格式
        echo "# CONFIG_ISO_IMAGES is not set" >> .config
        echo "# CONFIG_VDI_IMAGES is not set" >> .config
        
        # --- 5. 啟用 LuCI (Web 介面 - 英文原版) ---
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
        # 注意：已移除 CONFIG_LUCI_LANG_zh_hant (不安裝繁體中文)
        
        # --- 6. 基礎工具 (方便除錯或聯網) ---
        echo "CONFIG_PACKAGE_curl=y" >> .config
        echo "CONFIG_PACKAGE_wget-ssl=y" >> .config
        echo "CONFIG_PACKAGE_nano=y" >> .config

        # 應用配置
        make defconfig

    - name: 下載軟體包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 編譯固件
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s

    - name: 整理輸出文件
      id: organize
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        # 刪除不需要的 metadata 和未壓縮的 bin/img
        rm -f *.buildinfo
        rm -f *.json
        rm -f *.manifest
        rm -f *-kernel.bin
        rm -f *-rootfs.img
        # 這裡只會剩下 .vmdk 和 .img.gz
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上傳固件
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_Pure_${{ env.OPENWRT_VERSION }}
        path: ${{ env.FIRMWARE }}
