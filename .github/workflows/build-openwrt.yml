name: Build Custom OpenWrt (All Formats + OpenClash)

on:
  workflow_dispatch:
    inputs:
      router_ip:
        description: '請設置路由器的管理地址 (格式:192.168.x.1 或 10.x.x.1)'
        required: true
        default: '192.168.10.1'
        type: string
      firmware_size:
        description: '請輸入要編譯的韌體大小 單位(MB)'
        required: true
        default: '2048'
        type: string
      include_docker:
        description: '是否編譯 Docker 與圖形化管理套件？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      include_openclash:
        description: '是否安裝 OpenClash (網路代理工具)？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      include_ext_apps:
        description: '是否編譯常用實用外掛 (UPnP/網路共享/網頁終端/遠端喚醒/DDNS)？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

# 必須開啟寫入權限，GitHub Actions 才有權限自動建立 Release
permissions:
  contents: write

jobs:
  build:
    name: Build OpenWrt
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget qemu-utils
        sudo apt-get -y autoremove --purge
        sudo apt-get clean

    - name: Auto-detect and Clone Latest Stable OpenWrt
      run: |
        # 自動偵測最新正式版 (排除 -rc 測試版)
        LATEST_TAG=$(git ls-remote --tags https://github.com/openwrt/openwrt.git | awk -F/ '{print $3}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
        
        echo "=========================================="
        echo "偵測到目前最新的官方穩定版為: $LATEST_TAG"
        echo "=========================================="
        
        git clone -b $LATEST_TAG --depth 1 https://github.com/openwrt/openwrt.git openwrt
        echo "OPENWRT_TAG=$LATEST_TAG" >> $GITHUB_ENV

    - name: Apply Custom Settings (IP & Language)
      working-directory: ./openwrt
      run: |
        # 1. 替換預設 IP
        sed -i "s/192.168.1.1/${{ github.event.inputs.router_ip }}/g" package/base-files/files/bin/config_generate
        echo "已將預設 IP 修改為: ${{ github.event.inputs.router_ip }}"
        
        # 2. 強制預設顯示繁體中文
        mkdir -p package/base-files/files/etc/uci-defaults
        cat << "EOF" > package/base-files/files/etc/uci-defaults/99-default-zh-tw
        #!/bin/sh
        uci set luci.main.lang='zh_tw'
        uci commit luci
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/99-default-zh-tw

    - name: Download OpenClash Source
      working-directory: ./openwrt
      run: |
        if [ "${{ github.event.inputs.include_openclash }}" = "yes" ]; then
          echo "正在下載 OpenClash 源碼..."
          mkdir -p package/custom
          git clone --depth 1 -b master https://github.com/vernesong/OpenClash.git package/custom/luci-app-openclash
        fi

    - name: Update and install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate default configuration (x86_64 + Custom features)
      working-directory: ./openwrt
      run: |
        rm -f .config
        touch .config
        
        # 1. 基礎平台設定
        echo "CONFIG_TARGET_x86=y" >> .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
        
        # 2. 映像檔格式設定 (同時保留 EXT4 和 SquashFS)
        echo "CONFIG_TARGET_ROOTFS_EXT4=y" >> .config
        echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
        echo "CONFIG_VMDK_IMAGES=y" >> .config
        
        # 3. 磁碟空間 (這裡設定編譯參數，但我們會再用後處理強制確保大小)
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ github.event.inputs.firmware_size }}" >> .config
        
        # [關鍵] 加入磁碟工具，確保 SquashFS 開機後能自動擴容 Overlay
        echo "CONFIG_PACKAGE_parted=y" >> .config
        echo "CONFIG_PACKAGE_losetup=y" >> .config
        echo "CONFIG_PACKAGE_resize2fs=y" >> .config
        echo "CONFIG_PACKAGE_lsblk=y" >> .config
        
        # 4. 內建 LuCI 與中文
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-base-zh-tw=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-attendedsysupgrade=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-attendedsysupgrade-zh-tw=y" >> .config
        
        # 5. Docker 設定
        if [ "${{ github.event.inputs.include_docker }}" = "yes" ]; then
          echo "CONFIG_PACKAGE_docker=y" >> .config
          echo "CONFIG_PACKAGE_dockerd=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-dockerman=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-dockerman-zh-tw=y" >> .config
        fi

        # 6. OpenClash 設定
        if [ "${{ github.event.inputs.include_openclash }}" = "yes" ]; then
          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-openclash-zh-tw=y" >> .config
          echo "CONFIG_PACKAGE_dnsmasq=n" >> .config
          echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_bash=y" >> .config
          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
        fi

        # 7. 常用外掛設定
        if [ "${{ github.event.inputs.include_ext_apps }}" = "yes" ]; then
          echo "CONFIG_PACKAGE_luci-app-upnp=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-upnp-zh-tw=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-samba4=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-samba4-zh-tw=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-ttyd-zh-tw=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-wol=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-wol-zh-tw=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ddns=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-ddns-zh-tw=y" >> .config
        fi
        
        make defconfig

    - name: Download package sources
      working-directory: ./openwrt
      run: |
        make download -j8

    - name: Compile the firmware
      working-directory: ./openwrt
      run: |
        echo "開始使用 $(nproc) 個執行緒進行編譯..."
        make -j$(nproc) || make -j1 V=s

    - name: Prepare and Resize Firmware Files
      run: |
        cd openwrt/bin/targets/x86/64/
        
        echo "正在解壓縮所有映像檔..."
        gzip -d *.gz || true
        
        # [關鍵步驟] 強制調整所有 .img 檔案的物理大小到用戶指定值 (例如 2048M)
        # 這樣 SquashFS 刷機後就會有足夠的「未分配空間」供 Overlay 使用
        TARGET_SIZE="${{ github.event.inputs.firmware_size }}M"
        echo "🔥 正在強制將映像檔撐大至: $TARGET_SIZE ..."
        
        for img in *.img; do
          if [ -f "$img" ]; then
            echo "Resizing $img ..."
            qemu-img resize -f raw "$img" "$TARGET_SIZE"
          fi
        done
        
        # 在調整完大小後，再檢查並轉換 VMDK (確保 VMDK 也是大容量)
        echo "檢查並補齊缺失的 VMDK 檔案..."
        for img in *.img; do
          if [ -f "$img" ]; then
            vmdk=${img%.img}.vmdk
            # 即使 VMDK 存在，我們也重新轉一次，確保它繼承了新的 2GB 大小
            echo "轉換/更新 VMDK: $img -> $vmdk"
            rm -f "$vmdk"
            qemu-img convert -f raw -O vmdk "$img" "$vmdk"
          fi
        done
        
        mkdir -p release_files
        
        cp *.img release_files/ 2>/dev/null || true
        cp *.vmdk release_files/ 2>/dev/null || true
        
        cp config.buildinfo release_files/config_編譯功能套件清單.buildinfo 2>/dev/null || true
        cp feeds.buildinfo release_files/feeds_外部軟體源紀錄.buildinfo 2>/dev/null || true
        cp version.buildinfo release_files/version_內部編譯號.buildinfo 2>/dev/null || true
        cp profiles.json release_files/profiles_硬體支援說明.json 2>/dev/null || true
        cp sha256sums release_files/sha256sums_檔案驗證碼.txt 2>/dev/null || true
        
        for f in *.manifest; do
          if [ -f "$f" ]; then
            cp "$f" "release_files/${f%.manifest}_預裝軟體清單.manifest"
          fi
        done
        
        cd release_files
        echo "正在壓縮檔案以符合 GitHub 限制..."
        gzip *.img
        gzip *.vmdk
        echo "打包完成！"

    - name: Generate Release Info
      run: |
        DATE_STR=$(date +"%Y%m%d-%H%M")
        RELEASE_NAME="OpenWRT+${{ env.OPENWRT_TAG }}-${DATE_STR}"
        RELEASE_TAG="${{ env.OPENWRT_TAG }}-${DATE_STR}"
        echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
        echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV

    - name: Upload firmware to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: ${{ env.RELEASE_NAME }}
        files: openwrt/bin/targets/x86/64/release_files/*
        body: |
          ### OpenWrt (x86_64) 自定義編譯發布 (含 OpenClash)
          
          * **版本名稱**: ${{ env.RELEASE_NAME }}
          * **官方源碼**: ${{ env.OPENWRT_TAG }} 
          
          #### 🔐 登入資訊：
          * **登入網址**: `http://${{ github.event.inputs.router_ip }}`
          * **帳號**: `root` / **密碼**: `無`
          * **預設語系**: `繁體中文`
          
          #### 🚀 配置清單：
          * **系統空間**: `${{ github.event.inputs.firmware_size }} MB` (SquashFS 將自動擴容至此大小)
          * **OpenClash**: `${{ github.event.inputs.include_openclash == 'yes' && '✅ 已包含' || '❌ 未包含' }}`
          * **Docker**: `${{ github.event.inputs.include_docker == 'yes' && '✅ 已包含' || '❌ 未包含' }}`
          * **常用外掛**: `${{ github.event.inputs.include_ext_apps == 'yes' && '✅ 已包含' || '❌ 未包含' }}`
          
          #### 📥 下載說明 (請先解壓縮 .gz)：
          * **實體機 (推薦)**: `squashfs-combined-efi.img.gz` (刷入後開機，會自動擴容 Overlay)。
          * **虛擬機**: `squashfs-combined-efi.vmdk.gz` (匯入後即為 ${{ github.event.inputs.firmware_size }} MB 大硬碟)。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
