name: Build OpenWrt (APK Image Builder)

on:
  workflow_dispatch:
    inputs:
      router_ip:
        description: '請設置路由器的管理地址'
        required: true
        default: '192.168.10.1'
        type: string
      firmware_size:
        description: '請輸入韌體大小 (MB)'
        required: true
        default: '2048'
        type: string
      include_openclash:
        description: '是否內建 OpenClash？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      include_docker:
        description: '是否內建 Docker？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      include_ext_apps:
        description: '是否內建常用外掛 (UPnP/Samba/TTYD/WOL/DDNS)？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  contents: write

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
        zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 qemu-utils
        sudo apt-get clean

    - name: Download Image Builder
      run: |
        # 1. 抓取最新穩定版 (v25.xx 或最新)
        LATEST_TAG=$(git ls-remote --tags https://github.com/openwrt/openwrt.git | awk -F/ '{print $3}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
        VERSION=${LATEST_TAG#v}
        
        echo "正在下載 OpenWrt Image Builder 版本: $VERSION ..."
        
        IB_URL="https://downloads.openwrt.org/releases/$VERSION/targets/x86/64/openwrt-imagebuilder-$VERSION-x86-64.Linux-x86_64.tar.xz"
        wget -O imagebuilder.tar.xz "$IB_URL"
        
        tar -xf imagebuilder.tar.xz
        mv openwrt-imagebuilder-* openwrt
        
        echo "OPENWRT_VERSION=$VERSION" >> $GITHUB_ENV
        echo "BUILD_DATE=$(date +"%Y%m%d")" >> $GITHUB_ENV

    - name: Prepare OpenClash (APK Mode)
      working-directory: ./openwrt
      run: |
        if [ "${{ github.event.inputs.include_openclash }}" = "yes" ]; then
          echo "正在處理 OpenClash APK..."
          mkdir -p packages
          
          # 1. 下載最新的 .apk 檔案
          CLASH_URL=$(curl -sL https://api.github.com/repos/vernesong/OpenClash/releases/latest | grep "browser_download_url" | grep "luci-app-openclash" | grep ".apk" | head -n 1 | cut -d '"' -f 4)
          echo "下載連結: $CLASH_URL"
          wget -P packages "$CLASH_URL"
          
          # 2. [關鍵步驟] 建立 APK 索引 (APKINDEX)
          # Image Builder 裡面通常包含 apk 工具，我們需要找到它
          # 如果找不到，我們嘗試使用 staging_dir 下的
          APK_BIN=$(find . -name apk -type f -executable | grep "host/bin/apk" | head -n 1)
          
          if [ -n "$APK_BIN" ]; then
            echo "使用內建工具建立索引: $APK_BIN"
            "$APK_BIN" mkindex -o packages/APKINDEX.tar.gz packages/*.apk
          else
            echo "⚠️ 警告: 找不到 Image Builder 內建的 apk 工具，嘗試略過索引步驟..."
          fi
          
          # 3. 將本地 packages 加入軟體源，並標記為允許無簽章 (@custom)
          # 取得當前路徑
          PWD_DIR=$(pwd)
          # 在 repositories.conf 第一行插入我們的本地源
          sed -i "1i src/custom file://$PWD_DIR/packages" repositories.conf
          # 或者嘗試追加
          # echo "src/custom file://$PWD_DIR/packages" >> repositories.conf
          
          echo "OpenClash 準備完成"
        fi

    - name: Configure Firmware
      working-directory: ./openwrt
      run: |
        # 1. 設定 2GB 空間 (修改設定檔)
        sed -i '/CONFIG_TARGET_ROOTFS_PARTSIZE/d' .config
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ github.event.inputs.firmware_size }}" >> .config
        
        # 2. 設定 IP 與中文 (uci-defaults)
        mkdir -p files/etc/uci-defaults
        cat << "EOF" > files/etc/uci-defaults/99-custom-settings
        #!/bin/sh
        uci set network.lan.ipaddr='${{ github.event.inputs.router_ip }}'
        uci set luci.main.lang='zh_tw'
        uci commit
        exit 0
        EOF
        chmod +x files/etc/uci-defaults/99-custom-settings

    - name: Build Firmware
      working-directory: ./openwrt
      run: |
        # 基礎套件
        PACKAGES="base-files libc ca-bundle curl wget bash unzip gzip \
        luci luci-ssl luci-base luci-compat \
        luci-i18n-base-zh-tw \
        luci-app-attendedsysupgrade \
        parted losetup resize2fs lsblk"
        
        # OpenClash (APK 模式)
        if [ "${{ github.event.inputs.include_openclash }}" = "yes" ]; then
            # APK 模式下，我們只需要指定套件名稱
            # 依賴關係 (dnsmasq-full 等) 應該由 apk 自動解析，但為了保險我們明確指定
            # 注意：在 APK 中，移除套件的語法可能不同，但在 Image Builder 中 -package 仍然通用
            PACKAGES="$PACKAGES luci-app-openclash \
            -dnsmasq dnsmasq-full \
            ruby ruby-yaml kmod-tun kmod-inet-diag kmod-nft-tproxy libcap libcap-bin"
        fi
        
        # Docker
        if [ "${{ github.event.inputs.include_docker }}" = "yes" ]; then
            PACKAGES="$PACKAGES docker dockerd luci-app-dockerman luci-i18n-dockerman-zh-tw"
        fi
        
        # 常用外掛
        if [ "${{ github.event.inputs.include_ext_apps }}" = "yes" ]; then
            PACKAGES="$PACKAGES luci-app-upnp luci-i18n-upnp-zh-tw \
            luci-app-samba4 luci-i18n-samba4-zh-tw \
            luci-app-ttyd luci-i18n-ttyd-zh-tw \
            luci-app-wol luci-i18n-wol-zh-tw \
            luci-app-ddns luci-i18n-ddns-zh-tw"
        fi
        
        echo "開始打包映像檔..."
        # 加上 --allow-untrusted 參數以允許安裝我們自己下載的未簽章 OpenClash
        # 注意：EXTRA_IMAGE_NAME 只是方便命名，關鍵是 PACKAGES
        make image PROFILE=generic PACKAGES="$PACKAGES" FILES="files" EXTRA_kmod_fs_ext4=y

    - name: Process Files
      working-directory: ./openwrt/bin/targets/x86/64
      run: |
        echo "正在處理檔案..."
        mkdir -p ../../../../release_files
        
        # 複製生成的檔案
        for file in *combined-efi.img.gz; do
          if [ -f "$file" ]; then
            cp "$file" "../../../../release_files/"
            
            # 解壓並轉換 VMDK
            gunzip -k "$file"
            raw_file=${file%.gz}
            vmdk_file=${raw_file%.img}.vmdk
            
            echo "正在轉換 VMDK: $raw_file -> $vmdk_file"
            qemu-img convert -f raw -O vmdk "$raw_file" "../../../../release_files/$vmdk_file"
          fi
        done

    - name: Compress VMDK
      run: |
        cd release_files
        gzip *.vmdk

    - name: Upload to Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.OPENWRT_VERSION }}-${{ env.BUILD_DATE }}
        name: OpenWrt v${{ env.OPENWRT_VERSION }} (APK Build)
        files: release_files/*
        body: |
          ### OpenWrt x86_64 穩定版 (APK Image Builder)
          
          * **核心版本**: v${{ env.OPENWRT_VERSION }}
          * **打包日期**: ${{ env.BUILD_DATE }}
          
          #### 🔐 資訊：
          * **IP**: `${{ github.event.inputs.router_ip }}`
          * **帳號**: `root` / **密碼**: `無`
          
          #### 🚀 功能：
          * **OpenClash**: ${{ github.event.inputs.include_openclash }} (APK版)
          * **Docker**: ${{ github.event.inputs.include_docker }}
          * **常用外掛**: ${{ github.event.inputs.include_ext_apps }}
          
          #### 💾 空間：
          * **系統分區**: `${{ github.event.inputs.firmware_size }} MB`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
