name: Build OpenWrt & Release

# 添加寫入權限，以便上傳 Release
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      lan_ip:
        description: '請設置路由器的管理地址 (LAN IP)'
        default: '192.168.10.1'
        required: true
      rootfs_size:
        description: '請輸入韌體大小 (MB)'
        default: '2048'
        required: true

env:
  REPO_URL: https://github.com/openwrt/openwrt
  TZ: Asia/Taipei

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: 初始化編譯環境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        docker rmi `docker images -q` || true
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        # 包含 qemu-utils 用於生成 vmdk
        sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils python3-setuptools python3-pyelftools \
        rsync unzip zlib1g-dev file wget qemu-utils
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 下載源碼並切換至最新穩定版
      run: |
        git clone $REPO_URL openwrt
        cd openwrt
        LATEST_TAG=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -n 1)
        echo "檢測到的最新穩定版本為: $LATEST_TAG"
        git checkout $LATEST_TAG
        echo "OPENWRT_VERSION=$LATEST_TAG" >> $GITHUB_ENV
        # 生成當前日期變數，用於 Release Tag
        echo "DATE=$(date +%Y.%m.%d-%H%M)" >> $GITHUB_ENV

    - name: 更新並安裝 Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 自定義配置 (IP, 空間, LuCI, 格式)
      run: |
        cd openwrt
        
        # --- 1. 修改 LAN IP ---
        sed -i "s/192.168.1.1/${{ inputs.lan_ip }}/g" package/base-files/files/bin/config_generate
        
        # --- 2. 生成基礎配置 (x86/64) ---
        echo "CONFIG_TARGET_x86=y" > .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_Generic=y" >> .config
        
        # --- 3. 設定韌體分區大小 ---
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ inputs.rootfs_size }}" >> .config
        echo "CONFIG_TARGET_KERNEL_PARTSIZE=256" >> .config
        
        # --- 4. 設定輸出格式 ---
        # 只開啟 gzip img，vmdk 稍後手動壓縮
        echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
        echo "CONFIG_VMDK_IMAGES=y" >> .config
        echo "# CONFIG_ISO_IMAGES is not set" >> .config
        echo "# CONFIG_VDI_IMAGES is not set" >> .config
        
        # --- 5. 啟用 LuCI (英文原版) ---
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
        
        # --- 6. 基礎工具 ---
        echo "CONFIG_PACKAGE_curl=y" >> .config
        echo "CONFIG_PACKAGE_wget-ssl=y" >> .config
        echo "CONFIG_PACKAGE_nano=y" >> .config

        make defconfig

    - name: 下載軟體包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 編譯固件
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s

    - name: 整理文件與手動壓縮
      id: organize
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        
        # 刪除不需要的雜檔
        rm -f *.buildinfo *.json *.manifest *-kernel.bin *-rootfs.img
        
        # --- 關鍵步驟：手動壓縮 VMDK ---
        # 使用 gzip -9 (最高壓縮率) 強制壓縮所有 vmdk 文件
        echo "正在壓縮 VMDK 文件..."
        gzip -9 *.vmdk
        
        # 此時資料夾內應該只剩下 .img.gz 和 .vmdk.gz
        ls -lh
        
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 發布 Release
      uses: softprops/action-gh-release@v1
      if: steps.organize.outputs.status == 'success'
      with:
        # 使用 "版本號-日期" 作為 Tag，例如 v23.05.5-2023.10.20
        tag_name: ${{ env.OPENWRT_VERSION }}-${{ env.DATE }}
        name: OpenWrt ${{ env.OPENWRT_VERSION }} (${{ env.DATE }})
        files: ${{ env.FIRMWARE }}/*
        body: |
          ### ✅ 編譯成功 / Build Success
          
          這是自動生成的純淨版 OpenWrt 固件。
          This is an automatically generated pure OpenWrt firmware.
          
          ### 📝 固件資訊 / Firmware Info
          
          *   **版本 (Version):** `${{ env.OPENWRT_VERSION }}`
          *   **管理地址 (IP):** `${{ inputs.lan_ip }}`
          *   **預設帳號 (Account):** `root`
          *   **預設密碼 (Password):** `無 / None`
          *   **分區大小 (Size):** `${{ inputs.rootfs_size }} MB`
          
          ### 📂 檔案說明 / Files
          
          *   `combined-efi.img.gz`: 實體機或 PVE (UEFI) 使用。
          *   `combined.img.gz`: 傳統 BIOS 引導使用。
          *   `generic.vmdk.gz`: VMware / ESXi 虛擬機使用 (請解壓後掛載)。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
