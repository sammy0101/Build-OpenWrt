name: Build OpenWrt & Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      lan_ip:
        description: 'OpenWrt 本機管理 IP (LAN IP)'
        default: '192.168.10.2'
        required: true
      rootfs_size:
        description: '韌體大小 (MB)'
        default: '2048'
        required: true
      is_side_router:
        description: '是否設為旁路由模式? (關閉 DHCP, 設定 Gateway)'
        type: choice
        options:
          - 'no'
          - 'yes'
        default: 'no'
      gateway_ip:
        description: '主路由 IP (Gateway) (若選 yes 則必填)'
        default: '192.168.10.1'
        required: false

env:
  REPO_URL: https://github.com/openwrt/openwrt
  TZ: Asia/Taipei

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: 初始化編譯環境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        docker rmi `docker images -q` || true
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils python3-setuptools python3-pyelftools \
        rsync unzip zlib1g-dev file wget qemu-utils
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 下載源碼並切換至最新穩定版
      run: |
        git clone $REPO_URL openwrt
        cd openwrt
        LATEST_TAG=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -n 1)
        echo "檢測到的最新穩定版本為: $LATEST_TAG"
        git checkout $LATEST_TAG
        echo "OPENWRT_VERSION=$LATEST_TAG" >> $GITHUB_ENV
        echo "DATE=$(date +%Y.%m.%d-%H%M)" >> $GITHUB_ENV

    - name: 更新並安裝 Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 自定義配置 (IP, 旁路由, LuCI, 格式)
      run: |
        cd openwrt
        
        # --- 1. 建立 "初次開機設定腳本" (UCI Defaults) ---
        mkdir -p files/etc/uci-defaults
        
        # 使用 cat <<EOF 的方式寫入腳本，這樣可以直接引用 ${{ inputs.xxx }}
        cat > files/etc/uci-defaults/99-custom-setup <<EOF
        #!/bin/sh
        
        # 設定本機 LAN IP
        uci set network.lan.ipaddr='${{ inputs.lan_ip }}'
        uci set network.lan.netmask='255.255.255.0'
        
        # 設定系統時區
        uci set system.@system[0].timezone='CST-8'
        uci set system.@system[0].zonename='Asia/Taipei'
        
        # === 判斷是否為旁路由模式 ===
        if [ "${{ inputs.is_side_router }}" = "yes" ]; then
            # 1. 設定 Gateway 和 DNS 指向主路由
            uci set network.lan.gateway='${{ inputs.gateway_ip }}'
            uci set network.lan.dns='${{ inputs.gateway_ip }}'
            
            # 2. 關閉 DHCP Server (忽略介面)
            uci set dhcp.lan.ignore='1'
            
            # 3. 防火牆修正 (讓旁路由可以上網與轉發)
            uci set firewall.@defaults[0].forward='ACCEPT'
            uci set firewall.@zone[0].masq='1'
        fi
        
        uci commit
        exit 0
        EOF
        
        # 給予腳本執行權限
        chmod +x files/etc/uci-defaults/99-custom-setup
        
        # --- 2. 生成基礎配置 (x86/64) ---
        echo "CONFIG_TARGET_x86=y" > .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_Generic=y" >> .config
        
        # --- 3. 設定韌體分區大小 ---
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ inputs.rootfs_size }}" >> .config
        echo "CONFIG_TARGET_KERNEL_PARTSIZE=256" >> .config
        
        # --- 4. 設定輸出格式 ---
        echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
        echo "CONFIG_VMDK_IMAGES=y" >> .config
        echo "# CONFIG_ISO_IMAGES is not set" >> .config
        echo "# CONFIG_VDI_IMAGES is not set" >> .config
        
        # --- 5. 啟用 LuCI (英文原版) ---
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
        
        # --- 6. 線上更新 (Attended Sysupgrade) 與基礎工具 ---
        # 這是官方正確的更新插件名稱
        echo "CONFIG_PACKAGE_luci-app-attendedsysupgrade=y" >> .config
        
        # 必要 SSL 依賴 (讓 opkg 能下載 HTTPS 源)
        echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
        echo "CONFIG_PACKAGE_libustream-openssl=y" >> .config
        echo "CONFIG_PACKAGE_curl=y" >> .config
        echo "CONFIG_PACKAGE_wget-ssl=y" >> .config
        echo "CONFIG_PACKAGE_nano=y" >> .config

        make defconfig

    - name: 下載軟體包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 編譯固件
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s

    - name: 整理文件與手動壓縮
      id: organize
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        rm -f *.buildinfo *.json *.manifest *-kernel.bin *-rootfs.img
        
        # 壓縮 VMDK
        echo "正在壓縮 VMDK..."
        gzip -9 *.vmdk
        
        ls -lh
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 發布 Release
      uses: softprops/action-gh-release@v1
      if: steps.organize.outputs.status == 'success'
      with:
        tag_name: ${{ env.OPENWRT_VERSION }}-${{ env.DATE }}
        name: OpenWrt ${{ env.OPENWRT_VERSION }} (${{ env.DATE }})
        files: ${{ env.FIRMWARE }}/*
        body: |
          ### ✅ 編譯資訊 / Build Info
          
          *   **版本:** `${{ env.OPENWRT_VERSION }}`
          *   **模式:** `${{ inputs.is_side_router == 'yes' && '旁路由 (Side Router)' || '主路由 (Gateway)' }}`
          *   **IP 地址:** `${{ inputs.lan_ip }}`
          *   **Gateway:** `${{ inputs.gateway_ip }}`
          *   **帳號/密碼:** `root` / `無`
          
          ### 🛠 功能說明
          
          1.  **旁路由模式**: 若選擇 Yes，首次開機將自動設定 Gateway、DNS 並關閉 DHCP。
          2.  **Attended Sysupgrade**: 已預裝官方升級插件，位於 `System` -> `Attended Sysupgrade`。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
