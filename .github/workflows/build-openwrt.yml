name: Build Custom OpenWrt and Release

on:
  workflow_dispatch:
    inputs:
      router_ip:
        description: '請設置路由器的管理地址 (格式:192.168.x.1 或 10.x.x.1)'
        required: true
        default: '192.168.10.1'
        type: string
      firmware_size:
        description: '請輸入要編譯的韌體大小 單位(MB)'
        required: true
        default: '2048'
        type: string
      include_docker:
        description: '是否編譯 Docker 與圖形化管理套件？'
        required: true
        default: true
        type: boolean

# 必須開啟寫入權限，GitHub Actions 才有權限自動建立 Release
permissions:
  contents: write

jobs:
  build:
    name: Build OpenWrt
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget qemu-utils
        sudo apt-get -y autoremove --purge
        sudo apt-get clean

    - name: Auto-detect and Clone Latest Stable OpenWrt
      run: |
        # 自動偵測最新正式版 (例如 v24.10.5)
        LATEST_TAG=$(git ls-remote --tags https://github.com/openwrt/openwrt.git | awk -F/ '{print $3}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
        
        echo "=========================================="
        echo "偵測到目前最新的官方穩定版為: $LATEST_TAG"
        echo "=========================================="
        
        git clone -b $LATEST_TAG --depth 1 https://github.com/openwrt/openwrt.git openwrt
        echo "OPENWRT_TAG=$LATEST_TAG" >> $GITHUB_ENV

    - name: Apply Custom Settings (IP)
      working-directory: ./openwrt
      run: |
        # 替換預設 IP
        sed -i "s/192.168.1.1/${{ github.event.inputs.router_ip }}/g" package/base-files/files/bin/config_generate
        echo "已將預設 IP 修改為: ${{ github.event.inputs.router_ip }}"

    - name: Update and install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate default configuration (x86_64 + Custom features)
      working-directory: ./openwrt
      run: |
        rm -f .config
        touch .config
        
        # 1. 基礎平台設定
        echo "CONFIG_TARGET_x86=y" >> .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
        
        # 2. 映像檔格式設定
        echo "CONFIG_TARGET_ROOTFS_EXT4=y" >> .config
        echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
        echo "CONFIG_VMDK_IMAGES=y" >> .config
        
        # 3. 磁碟空間 (讀取表單填寫的 MB 數)
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ github.event.inputs.firmware_size }}" >> .config
        
        # 4. 內建 LuCI 網頁管理與中文、線上更新
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-base-zh-tw=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-attendedsysupgrade=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-attendedsysupgrade-zh-tw=y" >> .config
        
        # 5. 若勾選 Docker，則加入相關核心與 LuCI 介面
        if [ "${{ github.event.inputs.include_docker }}" = "true" ]; then
          echo "CONFIG_PACKAGE_docker=y" >> .config
          echo "CONFIG_PACKAGE_dockerd=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-dockerman=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-dockerman-zh-tw=y" >> .config
        fi
        
        make defconfig

    - name: Download package sources
      working-directory: ./openwrt
      run: |
        make download -j8

    - name: Compile the firmware
      working-directory: ./openwrt
      run: |
        echo "開始使用 $(nproc) 個執行緒進行編譯..."
        make -j$(nproc) || make -j1 V=s

    - name: Prepare, Filter and Rename Firmware Files
      run: |
        cd openwrt/bin/targets/x86/64/
        gzip -d *.gz || true
        mkdir -p release_files
        
        cp *squashfs-combined*.img release_files/ 2>/dev/null || true
        cp *squashfs-combined*.vmdk release_files/ 2>/dev/null || true
        cp *ext4-combined*.img release_files/ 2>/dev/null || true
        cp *ext4-combined*.vmdk release_files/ 2>/dev/null || true
        
        cp config.buildinfo release_files/config_編譯功能套件清單.buildinfo 2>/dev/null || true
        cp feeds.buildinfo release_files/feeds_外部軟體源紀錄.buildinfo 2>/dev/null || true
        cp version.buildinfo release_files/version_內部編譯號.buildinfo 2>/dev/null || true
        cp profiles.json release_files/profiles_硬體支援說明.json 2>/dev/null || true
        cp sha256sums release_files/sha256sums_檔案驗證碼.txt 2>/dev/null || true
        
        for f in *.manifest; do
          if [ -f "$f" ]; then
            cp "$f" "release_files/${f%.manifest}_預裝軟體清單.manifest"
          fi
        done

    - name: Generate Release Info
      run: |
        DATE_STR=$(date +"%Y%m%d")
        RELEASE_NAME="OpenWRT+${{ env.OPENWRT_TAG }}-${DATE_STR}"
        RELEASE_TAG="${{ env.OPENWRT_TAG }}-${DATE_STR}"
        echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
        echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV

    - name: Upload firmware to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: ${{ env.RELEASE_NAME }}
        files: openwrt/bin/targets/x86/64/release_files/*
        body: |
          ### OpenWrt (x86_64) 自定義編譯發布
          
          * **版本名稱**: ${{ env.RELEASE_NAME }}
          * **官方源碼**: ${{ env.OPENWRT_TAG }} 
          
          #### 🔐 登入資訊 (請務必記住)：
          * **登入網址 (IP)**: `http://${{ github.event.inputs.router_ip }}`
          * **帳號 (AC)**: `root`
          * **密碼 (PW)**: `無` *(初次登入預設為空，登入後請盡速設定密碼)*
          
          #### 🚀 你的專屬配置清單：
          * **系統空間大小**: `${{ github.event.inputs.firmware_size }} MB`
          * **Docker 容器支援**: `${{ github.event.inputs.include_docker == 'true' && '✅ 已包含 (可於網頁後台管理 Docker)' || '❌ 未包含' }}`
          
          #### 📥 韌體下載指南：
          * **現代化主機 / VM 虛擬機**：下載含 `efi` 的檔案。
          * **強烈推薦格式**：`squashfs` (支援後台一鍵恢復原廠設定)。
          * **虛擬機直通**：直接下載 `.vmdk` 匯入。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
