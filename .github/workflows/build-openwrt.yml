name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      router_ip:
        description: '請設置路由器的管理地址 (格式:192.168.x.1 或 10.x.x.1)'
        required: true
        default: '192.168.10.1'
        type: string
      firmware_size:
        description: '請輸入要編譯的韌體大小 單位(MB)'
        required: true
        default: '2048'
        type: string
      include_docker:
        description: '是否安裝 Docker？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      include_openclash:
        description: '是否安裝 OpenClash？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      include_ext_apps:
        description: '是否安裝常用外掛 (UPnP/Samba/TTYD/WOL/DDNS)？'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  contents: write

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
        zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 qemu-utils
        sudo apt-get clean

    - name: Download OpenWrt Image Builder
      run: |
        # 1. 偵測最新穩定版 (排除 -rc)
        LATEST_TAG=$(git ls-remote --tags https://github.com/openwrt/openwrt.git | awk -F/ '{print $3}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
        # 去掉 'v' 前綴以符合下載網址格式 (例如 v23.05.5 -> 23.05.5)
        VERSION=${LATEST_TAG#v}
        
        echo "正在下載 OpenWrt Image Builder 版本: $VERSION ..."
        
        # 建構下載網址 (x86/64)
        IB_URL="https://downloads.openwrt.org/releases/$VERSION/targets/x86/64/openwrt-imagebuilder-$VERSION-x86-64.Linux-x86_64.tar.xz"
        
        wget -O imagebuilder.tar.xz "$IB_URL"
        tar -xf imagebuilder.tar.xz
        
        # 重新命名解壓後的資料夾為 openwrt，方便後續操作
        mv openwrt-imagebuilder-* openwrt
        
        echo "OPENWRT_VERSION=$VERSION" >> $GITHUB_ENV
        echo "BUILD_DATE=$(date +"%Y%m%d")" >> $GITHUB_ENV

    - name: Download External Packages (OpenClash)
      working-directory: ./openwrt
      run: |
        mkdir -p packages
        
        if [ "${{ github.event.inputs.include_openclash }}" = "yes" ]; then
          echo "正在下載 OpenClash IPK..."
          # 從官方 Release 下載最新的 ipk
          CLASH_URL=$(curl -sL https://api.github.com/repos/vernesong/OpenClash/releases/latest | grep "browser_download_url" | grep "luci-app-openclash" | grep ".ipk" | head -n 1 | cut -d '"' -f 4)
          wget -P packages "$CLASH_URL"
          echo "OpenClash 下載完成"
        fi

    - name: Customize Configuration (IP & Size)
      working-directory: ./openwrt
      run: |
        # 1. 設定分區大小
        # Image Builder 透過 .config 設定 Partition Size
        sed -i "s/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=${{ github.event.inputs.firmware_size }}/" .config
        # 如果 .config 裡面沒有這行，就追加上去
        if ! grep -q "CONFIG_TARGET_ROOTFS_PARTSIZE" .config; then
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ github.event.inputs.firmware_size }}" >> .config
        fi

        # 2. 修改預設 IP (透過建立 files 資料夾覆蓋)
        mkdir -p files/etc/config
        
        # 我們直接產生一個 network 設定檔，或者修改首次開機腳本
        # 這裡使用最穩定的 uci-defaults 方法
        mkdir -p files/etc/uci-defaults
        cat << "EOF" > files/etc/uci-defaults/99-custom-settings
        #!/bin/sh
        # 修改 IP
        uci set network.lan.ipaddr='${{ github.event.inputs.router_ip }}'
        # 強制繁體中文
        uci set luci.main.lang='zh_tw'
        uci commit
        exit 0
        EOF
        chmod +x files/etc/uci-defaults/99-custom-settings

    - name: Build Firmware (Make Image)
      working-directory: ./openwrt
      run: |
        # 準備套件清單
        # 基礎必要包
        PACKAGES="base-files libc ca-bundle curl wget bash unzip gzip \
        luci luci-ssl luci-base luci-compat \
        luci-i18n-base-zh-tw \
        luci-app-attendedsysupgrade luci-i18n-attendedsysupgrade-zh-tw \
        parted losetup resize2fs lsblk"
        
        # 1. Docker
        if [ "${{ github.event.inputs.include_docker }}" = "yes" ]; then
            PACKAGES="$PACKAGES docker dockerd luci-app-dockerman luci-i18n-dockerman-zh-tw"
        fi
        
        # 2. 常用外掛
        if [ "${{ github.event.inputs.include_ext_apps }}" = "yes" ]; then
            PACKAGES="$PACKAGES luci-app-upnp luci-i18n-upnp-zh-tw \
            luci-app-samba4 luci-i18n-samba4-zh-tw \
            luci-app-ttyd luci-i18n-ttyd-zh-tw \
            luci-app-wol luci-i18n-wol-zh-tw \
            luci-app-ddns luci-i18n-ddns-zh-tw"
        fi
        
        # 3. OpenClash
        # 注意：Image Builder 會自動處理官方依賴 (ruby, dnsmasq-full 等)，但我們需要把 packages 資料夾加入源
        if [ "${{ github.event.inputs.include_openclash }}" = "yes" ]; then
            # 移除衝突的 dnsmasq 與 ip-tiny，加入 OpenClash 依賴的完整版
            PACKAGES="$PACKAGES -dnsmasq dnsmasq-full -ip-tiny ip-full \
            ruby ruby-yaml kmod-tun kmod-inet-diag kmod-nft-tproxy libcap libcap-bin \
            luci-app-openclash luci-i18n-openclash-zh-tw"
            
            # 將本地 packages 資料夾加入 repositories.conf
            echo "src custom file://$(pwd)/packages" >> repositories.conf
        fi
        
        echo "開始打包映像檔..."
        echo "使用的套件清單: $PACKAGES"
        
        # 執行打包指令
        # PROFILE=generic 對應 x86/64
        make image PROFILE=generic PACKAGES="$PACKAGES" FILES="files"

    - name: Post-Process (Convert & Resize)
      working-directory: ./openwrt/bin/targets/x86/64
      run: |
        echo "正在處理映像檔..."
        # Image Builder 產出的檔案通常在 bin/targets/x86/64/ 下
        
        # 解壓縮 img.gz
        gzip -d *.img.gz || true
        
        # 找出生成的 img 檔案 (通常是 openwrt-...-generic-squashfs-combined-efi.img)
        # 我們只處理 combined-efi.img (UEFI) 和 combined.img (Legacy)
        
        mkdir -p ../../../../release_files
        
        for img in *squashfs-combined*.img; do
          if [ -f "$img" ]; then
            echo "處理檔案: $img"
            
            # 確保檔案大小為使用者指定的大小 (Image Builder 的 .config 有時不一定生效於 squashfs padding)
            # 所以我們這裡再次強制 resize
            TARGET_SIZE="${{ github.event.inputs.firmware_size }}M"
            qemu-img resize -f raw "$img" "$TARGET_SIZE"
            
            # 轉換為 VMDK
            vmdk=${img%.img}.vmdk
            qemu-img convert -f raw -O vmdk "$img" "$vmdk"
            
            # 複製到發布目錄
            cp "$img" "../../../../release_files/"
            cp "$vmdk" "../../../../release_files/"
          fi
        done
        
        # 也要複製 ext4 (如果有生成的話，Image Builder 預設設定通常會生成)
        for img in *ext4-combined*.img; do
           if [ -f "$img" ]; then
             # Ext4 也要 resize
             TARGET_SIZE="${{ github.event.inputs.firmware_size }}M"
             qemu-img resize -f raw "$img" "$TARGET_SIZE"
             
             vmdk=${img%.img}.vmdk
             qemu-img convert -f raw -O vmdk "$img" "$vmdk"
             
             cp "$img" "../../../../release_files/"
             cp "$vmdk" "../../../../release_files/"
           fi
        done

    - name: Compress & Upload
      run: |
        cd release_files
        echo "正在壓縮檔案..."
        gzip *.img
        gzip *.vmdk
        
        echo "準備發布..."

    - name: Generate Release Tag
      run: |
        RELEASE_TAG="v${{ env.OPENWRT_VERSION }}-IB-${{ env.BUILD_DATE }}"
        echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

    - name: Upload to Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: OpenWrt v${{ env.OPENWRT_VERSION }} (ImageBuilder)
        files: release_files/*
        body: |
          ### OpenWrt x86_64 自動打包 (Image Builder 版)
          
          * **核心版本**: ${{ env.OPENWRT_VERSION }} (Official Stable)
          * **打包日期**: ${{ env.BUILD_DATE }}
          
          #### 🔐 資訊：
          * **IP**: `http://${{ github.event.inputs.router_ip }}`
          * **帳號**: `root` / **密碼**: `無`
          
          #### 📦 包含功能：
          * **OpenClash**: ${{ github.event.inputs.include_openclash }}
          * **Docker**: ${{ github.event.inputs.include_docker }}
          * **常用外掛**: ${{ github.event.inputs.include_ext_apps }}
          
          #### 📝 說明：
          此版本使用 **Official Image Builder** 製作，保證與官方原版核心完全一致，穩定性最高。
          包含 `.img.gz` (實體機) 與 `.vmdk.gz` (虛擬機)。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
